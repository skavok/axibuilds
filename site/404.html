    <script>
      // Backwards compat: old links like /repo/slug#fileId.key
      // Redirect to new param format: /repo/?legacy=fileId.key&n=slug
      var seg = location.pathname.split('/').filter(Boolean);
      var repoName = seg.length > 0 ? seg[0] : '';
      var slug = seg.slice(1).join('/');
      var hash = location.hash.length > 1 ? location.hash.substring(1) : '';
      if (hash) {
        var url = '/' + repoName + '/?legacy=' + encodeURIComponent(hash);
        if (slug) url += '&n=' + encodeURIComponent(slug);
        location.replace(url);
      } else if (slug) {
        location.replace('/' + repoName + '/');
      }
    </script>
